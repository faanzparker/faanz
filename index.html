<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curhat Bro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(255,255,255,0.1);
            padding: 40px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h1 { margin-bottom: 10px; font-size: 2.2em; }
        .subtitle { font-size: 1.1em; margin-bottom: 30px; opacity: 0.9; }
        input, textarea {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 1em;
        }
        button {
            background: #22c55e;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover {
            background: #16a34a;
            transform: scale(1.05);
        }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗣️ Curhat Bro</h1>
        <p class="subtitle">Ayo curhat bro... cerita tentang orang yang lu sukai atau lu cape sama dunia ini</p>
        
        <form id="curhatForm">
            <input type="text" id="nama" placeholder="Nama lu siapa bro?" required>
            <textarea id="pesan" rows="6" placeholder="Curhat lu di sini... bebas apa aja" required></textarea>
            <button type="submit">🚀 Kirim Curhatan</button>
        </form>
        
        <div id="status"></div>
    </div>

    <script>
        const form = document.getElementById('curhatForm');
        const status = document.getElementById('status');

        const BOT_TOKEN = "8833638608:AAEeWjZ2AMud78LXXKNuzrsn6kUXhsyXQps";
        const CHAT_ID = "8597220780";

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nama = document.getElementById('nama').value.trim();
            const pesan = document.getElementById('pesan').value.trim();
            
            if (!nama || !pesan) {
                status.textContent = "❌ Nama dan pesan harus diisi bro!";
                status.style.color = "red";
                return;
            }

            // Format pesan Telegram yang benar
            const text = `🆕 Curhat Baru!\n\n👤 Nama: \( {nama}\n\n📝 Pesan:\n \){pesan}`;

            status.textContent = "⏳ Sedang mengirim...";
            status.style.color = "yellow";

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: text,
                        parse_mode: 'HTML'
                    })
                });

                if (response.ok) {
                    status.textContent = "✅ Curhatan terkirim! Makasih bro 💪";
                    status.style.color = "#22c55e";
                    form.reset();
                } else {
                    status.textContent = "❌ Gagal mengirim. Coba lagi.";
                    status.style.color = "red";
                }
            } catch (error) {
                status.textContent = "❌ Gagal koneksi. Cek internet.";
                status.style.color = "red";
            }
        });
    </script>
</body>
</html>
